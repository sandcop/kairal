  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #004849;
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -100px; right: -100px;
      width: 300px; height: 300px;
      border-radius: 50%;
      background: rgba(255,255,255,0.025);
      pointer-events: none;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -80px; left: -80px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: rgba(255,255,255,0.025);
      pointer-events: none;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 0.5px solid rgba(255,255,255,0.14);
      border-radius: 22px;
      padding: 2.5rem 2rem 2rem;
      width: 100%;
      max-width: 360px;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .logo-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .logo-wrap svg {
      width: 68px;
      height: auto;
    }

    .logo-wordmark {
      font-size: 10px;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: rgba(255,255,255,0.4);
      text-transform: uppercase;
    }

    .divider {
      width: 36px;
      height: 0.5px;
      background: rgba(255,255,255,0.18);
      margin: 0 auto 1.5rem;
    }

    .doctor-name {
      font-size: 22px;
      font-weight: 600;
      color: #ffffff;
      margin-bottom: 5px;
      letter-spacing: 0.01em;
    }

    .doctor-title {
      font-size: 11px;
      font-weight: 400;
      color: rgba(255,255,255,0.42);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 1.75rem;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 13px 20px;
      border-radius: 11px;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.2s ease, border-color 0.2s ease;
      letter-spacing: 0.02em;
    }

    .btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
    }

    .btn-whatsapp {
      background: rgba(37,211,102,0.1);
      border: 0.5px solid rgba(37,211,102,0.28);
      color: #5dda8a;
    }
    .btn-whatsapp:hover { background: rgba(37,211,102,0.18); }

    .btn-email {
      background: transparent;
      border: 0.5px solid rgba(255,255,255,0.22);
      color: #ffffff;
    }
    .btn-email:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.4); }

    .btn-agendar {
      background: rgba(245,155,27,0.1);
      border: 0.5px solid rgba(245,155,27,0.32);
      color: #f5b84a;
    }
    .btn-agendar:hover { background: rgba(245,155,27,0.18); }

    .btn-web {
      background: rgba(72,185,178,0.12);

      color: #48b9b2;
    }

    .social-label {
      font-size: 10px;
      font-weight: 400;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-top: 1.5rem;
      margin-bottom: 0.75rem;
    }

    .social-row {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .btn-social {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .btn-social svg {
      width: 20px;
      height: 20px;
    }

    .btn-ig {
      background: rgba(225,48,108,0.1);
      border: 0.5px solid rgba(225,48,108,0.28);
