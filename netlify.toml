[build]
  functions = "netlify/functions"
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    # Fuerza HTTPS siempre
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    # Evita clickjacking
    X-Frame-Options = "SAMEORIGIN"
    # Evita sniffing de tipo MIME
    X-Content-Type-Options = "nosniff"
    # Aislamiento de ventanas cruzadas
    Cross-Origin-Opener-Policy = "same-origin-allow-popups"
    # Referrer policy
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permisos de features
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Política de seguridad de contenido
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://zu3r11hb.api.sanity.io https://www.google-analytics.com https://cdn.sanity.io https://maps.googleapis.com https://script.google.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self';"
